<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Floating Cloak Character Test</title>
  <style>
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at 50% 30%, #151525 0%, #09090f 45%, #020204 100%);
      font-family: system-ui, sans-serif;
    }
    canvas { display: block; }
    .hud {
      position: fixed;
      left: 14px;
      top: 14px;
      color: #d8d8e6;
      background: rgba(0,0,0,0.35);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      line-height: 1.4;
      backdrop-filter: blur(5px);
      max-width: 340px;
      pointer-events: none;
    }
    .hud strong { color: #fff; }
  </style>
</head>
<body>
  <div class="hud">
    <strong>Floating Cloak Prototype</strong><br>
    3D turn-based character test in one file.<br>
    The eyes idle, cross, orbit, and swap places occasionally.
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.161.0/build/three.module.js"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ------------------------------------------------------------
    // Scene / camera / renderer
    // ------------------------------------------------------------
    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x07070b, 0.08);

    const camera = new THREE.PerspectiveCamera(
      42,
      window.innerWidth / window.innerHeight,
      0.1,
      100
    );
    camera.position.set(0, 1.35, 5.1);

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    document.body.appendChild(renderer.domElement);

    // ------------------------------------------------------------
    // Lighting
    // ------------------------------------------------------------
    const ambient = new THREE.AmbientLight(0x8c8cb3, 1.15);
    scene.add(ambient);

    const key = new THREE.DirectionalLight(0xb8c7ff, 1.5);
    key.position.set(2.8, 4.2, 3.4);
    scene.add(key);

    const fill = new THREE.PointLight(0x6644ff, 8, 10, 2);
    fill.position.set(-1.2, 1.8, 2.2);
    scene.add(fill);

    // ------------------------------------------------------------
    // Ground mist shadow
    // ------------------------------------------------------------
    const shadowGeo = new THREE.CircleGeometry(1.35, 48);
    const shadowMat = new THREE.MeshBasicMaterial({
      color: 0x000000,
      transparent: true,
      opacity: 0.23
    });
    const shadow = new THREE.Mesh(shadowGeo, shadowMat);
    shadow.rotation.x = -Math.PI / 2;
    shadow.position.y = -1.55;
    scene.add(shadow);

    // ------------------------------------------------------------
    // Group root
    // ------------------------------------------------------------
    const character = new THREE.Group();
    scene.add(character);

    // ------------------------------------------------------------
    // Cloak geometry
    // A tapered cylinder that we deform slightly for cloth motion.
    // ------------------------------------------------------------
    const cloakGeo = new THREE.CylinderGeometry(0.48, 1.08, 2.65, 24, 26, true);
    const pos = cloakGeo.attributes.position;
    const original = [];

    const v = new THREE.Vector3();
    for (let i = 0; i < pos.count; i++) {
      v.fromBufferAttribute(pos, i);

      // Pull the upper part inward to form a hooded silhouette.
      const h = (v.y + 1.325) / 2.65; // 0 at bottom, 1 at top
      const pinch = THREE.MathUtils.lerp(1.0, 0.68, Math.pow(h, 2.1));
      v.x *= pinch;
      v.z *= pinch;

      // Slight front opening / asymmetry so it feels like a cloak, not a tube.
      if (v.z > 0) v.z *= 0.9;
      if (v.y > 0.65) {
        v.x *= 0.9;
        v.z *= 0.72;
      }

      pos.setXYZ(i, v.x, v.y, v.z);
      original.push(v.x, v.y, v.z);
    }

    cloakGeo.computeVertexNormals();

    const cloakMat = new THREE.MeshStandardMaterial({
      color: 0x050505,
      roughness: 0.92,
      metalness: 0.03,
      side: THREE.DoubleSide
    });

    const cloak = new THREE.Mesh(cloakGeo, cloakMat);
    cloak.castShadow = false;
    cloak.receiveShadow = false;
    character.add(cloak);

    // Hood / inner darkness
    const hoodGeo = new THREE.SphereGeometry(0.62, 24, 24, 0, Math.PI * 2, 0, Math.PI * 0.58);
    const hoodMat = new THREE.MeshStandardMaterial({
      color: 0x020202,
      roughness: 1,
      metalness: 0,
      side: THREE.DoubleSide
    });
    const hood = new THREE.Mesh(hoodGeo, hoodMat);
    hood.scale.set(1.0, 1.05, 0.95);
    hood.position.set(0, 0.92, 0.05);
    hood.rotation.x = Math.PI;
    character.add(hood);

    // ------------------------------------------------------------
    // Eyes
    // ------------------------------------------------------------
    const eyeHolder = new THREE.Group();
    eyeHolder.position.set(0, 0.45, 0.5);
    character.add(eyeHolder);

    function makeEye() {
      const g = new THREE.SphereGeometry(0.08, 20, 20);
      const m = new THREE.MeshStandardMaterial({
        color: 0xb9ecff,
        emissive: 0x7fd8ff,
        emissiveIntensity: 2.2,
        roughness: 0.15,
        metalness: 0.0
      });
      return new THREE.Mesh(g, m);
    }

    const leftEye = makeEye();
    const rightEye = makeEye();
    eyeHolder.add(leftEye, rightEye);

    const eyeGlowGeo = new THREE.SphereGeometry(0.14, 16, 16);
    const eyeGlowMatL = new THREE.MeshBasicMaterial({
      color: 0x69dfff,
      transparent: true,
      opacity: 0.11
    });
    const eyeGlowMatR = eyeGlowMatL.clone();

    const leftGlow = new THREE.Mesh(eyeGlowGeo, eyeGlowMatL);
    const rightGlow = new THREE.Mesh(eyeGlowGeo, eyeGlowMatR);
    eyeHolder.add(leftGlow, rightGlow);

    // ------------------------------------------------------------
    // Small drifting particles for mood
    // ------------------------------------------------------------
    const dustCount = 140;
    const dustGeo = new THREE.BufferGeometry();
    const dustPositions = new Float32Array(dustCount * 3);

    for (let i = 0; i < dustCount; i++) {
      const r = 6 + Math.random() * 6;
      const a = Math.random() * Math.PI * 2;
      const y = -2 + Math.random() * 5;
      dustPositions[i * 3 + 0] = Math.cos(a) * r * (0.35 + Math.random() * 0.65);
      dustPositions[i * 3 + 1] = y;
      dustPositions[i * 3 + 2] = Math.sin(a) * r * (0.35 + Math.random() * 0.65);
    }

    dustGeo.setAttribute('position', new THREE.BufferAttribute(dustPositions, 3));
    const dustMat = new THREE.PointsMaterial({
      color: 0x8d9ccf,
      size: 0.03,
      transparent: true,
      opacity: 0.55,
      depthWrite: false
    });
    const dust = new THREE.Points(dustGeo, dustMat);
    scene.add(dust);

    // ------------------------------------------------------------
    // Animation state machine for eye behavior
    // ------------------------------------------------------------
    const states = ['idle', 'cross', 'orbit', 'swap'];
    let currentState = 'idle';
    let stateStartedAt = 0;
    let nextStateAt = 2.2 + Math.random() * 1.7;

    function setState(name, now) {
      currentState = name;
      stateStartedAt = now;
      nextStateAt = now + (
        name === 'idle' ? 1.5 + Math.random() * 2.0 :
        name === 'cross' ? 0.65 + Math.random() * 0.35 :
        name === 'orbit' ? 1.2 + Math.random() * 1.1 :
        0.8 + Math.random() * 0.6
      );
    }

    function chooseNextState() {
      const r = Math.random();
      if (r < 0.45) return 'idle';
      if (r < 0.68) return 'cross';
      if (r < 0.86) return 'orbit';
      return 'swap';
    }

    // ------------------------------------------------------------
    // Main loop
    // ------------------------------------------------------------
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      // Overall float
      character.position.y = Math.sin(t * 1.2) * 0.14;
      character.rotation.y = Math.sin(t * 0.65) * 0.16;
      character.rotation.z = Math.sin(t * 1.1) * 0.025;

      // Ground shadow reacts to height
      const hover = character.position.y;
      shadow.scale.setScalar(1.0 - hover * 0.08);
      shadow.material.opacity = 0.24 - hover * 0.03;

      // Cloth deformation
      const p = cloakGeo.attributes.position;
      for (let i = 0; i < p.count; i++) {
        const ox = original[i * 3 + 0];
        const oy = original[i * 3 + 1];
        const oz = original[i * 3 + 2];

        const bottomFactor = THREE.MathUtils.clamp(((-oy + 1.25) / 2.5), 0, 1);
        const flutter =
          Math.sin(t * 2.8 + oy * 2.6 + oz * 4.5) * 0.028 * bottomFactor +
          Math.cos(t * 2.1 + ox * 5.4) * 0.018 * bottomFactor;

        const twist = Math.sin(t * 1.3 + oy * 1.9) * 0.02 * bottomFactor;

        p.setXYZ(
          i,
          ox + (oz * twist),
          oy + Math.sin(t * 2.3 + ox * 4.0 + oz * 3.2) * 0.012 * bottomFactor,
          oz + flutter - (ox * twist)
        );
      }
      p.needsUpdate = true;
      cloakGeo.computeVertexNormals();

      // Eye holder subtle drift inside hood
      eyeHolder.position.x = Math.sin(t * 0.9) * 0.05;
      eyeHolder.position.y = 0.47 + Math.cos(t * 1.3) * 0.04;
      eyeHolder.position.z = 0.50 + Math.sin(t * 0.7) * 0.03;

      // Switch eye state
      if (t > nextStateAt) setState(chooseNextState(), t);
      const st = t - stateStartedAt;

      let lx = -0.17, rx = 0.17;
      let ly = 0, ry = 0;
      let lz = 0, rz = 0;

      if (currentState === 'idle') {
        lx += Math.sin(t * 2.0) * 0.02;
        rx += Math.cos(t * 2.2) * 0.02;
        ly += Math.sin(t * 2.7) * 0.025;
        ry += Math.cos(t * 2.5) * 0.025;
      }

      if (currentState === 'cross') {
        const a = Math.sin(Math.min(st / 0.8, 1) * Math.PI);
        lx = THREE.MathUtils.lerp(-0.17, 0.03, a);
        rx = THREE.MathUtils.lerp(0.17, -0.03, a);
        ly = Math.sin(t * 9.0) * 0.02;
        ry = Math.cos(t * 9.0) * 0.02;
      }

      if (currentState === 'orbit') {
        const r = 0.16;
        lx = Math.cos(st * 4.0) * r;
        ly = Math.sin(st * 4.0) * 0.08;
        rx = Math.cos(st * 4.0 + Math.PI) * r;
        ry = Math.sin(st * 4.0 + Math.PI) * 0.08;
        lz = Math.sin(st * 4.0) * 0.03;
        rz = Math.sin(st * 4.0 + Math.PI) * 0.03;
      }

      if (currentState === 'swap') {
        const a = THREE.MathUtils.smootherstep(Math.min(st / 0.95, 1), 0, 1);
        lx = THREE.MathUtils.lerp(-0.17, 0.17, a);
        rx = THREE.MathUtils.lerp(0.17, -0.17, a);
        ly = Math.sin(a * Math.PI) * 0.09;
        ry = -Math.sin(a * Math.PI) * 0.09;
      }

      leftEye.position.set(lx, ly, lz);
      rightEye.position.set(rx, ry, rz);
      leftGlow.position.copy(leftEye.position);
      rightGlow.position.copy(rightEye.position);

      // Eye squish / pulse
      const pulse = 1 + Math.sin(t * 4.2) * 0.06;
      leftEye.scale.set(1, pulse, 1);
      rightEye.scale.set(1, 1 / pulse, 1);

      // Tiny camera drift to keep it alive
      camera.position.x = Math.sin(t * 0.32) * 0.16;
      camera.position.y = 1.35 + Math.cos(t * 0.28) * 0.06;
      camera.lookAt(0, 0.25, 0);

      // Dust drift
      dust.rotation.y += 0.0008;
      dust.position.y = Math.sin(t * 0.25) * 0.08;

      renderer.render(scene, camera);
    }

    setState('idle', 0);
    animate();

    // ------------------------------------------------------------
    // Resize
    // ------------------------------------------------------------
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
